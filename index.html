<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>さんすうビート!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:#0a0a2e}
body{display:flex;justify-content:center;align-items:center}
#game-container{position:relative;width:100%;max-width:500px;height:100vh;height:100dvh;overflow:hidden;background:linear-gradient(180deg,#0a0a2e 0%,#1a1a4e 40%,#2a1a5e 100%);transition:background .6s}
#game-container.fever{background:linear-gradient(180deg,#1a0a3e 0%,#3a1a6e 30%,#5a2a8e 60%,#2a1a5e 100%)}
.bg-star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur) ease-in-out infinite alternate;pointer-events:none}
@keyframes twinkle{0%{opacity:.2;transform:scale(.8)}100%{opacity:1;transform:scale(1.2)}}

/* Screen flash */
#screen-flash{position:absolute;inset:0;z-index:42;pointer-events:none;opacity:0}
.flash-perfect{background:radial-gradient(circle,rgba(255,235,59,.5),transparent 70%);animation:flashB .4s ease-out}
.flash-great{background:radial-gradient(circle,rgba(79,195,247,.4),transparent 70%);animation:flashB .3s ease-out}
@keyframes flashB{0%{opacity:1}100%{opacity:0}}

/* Cheer — contained, no overflow */
#cheer{position:absolute;top:28%;left:50%;z-index:43;pointer-events:none;font-weight:900;font-size:clamp(1.5rem,6vw,2.5rem);opacity:0;max-width:90%;text-align:center;line-height:1.3;overflow:hidden;text-overflow:ellipsis}
.cheer-anim{animation:cheerPop 2.2s cubic-bezier(.17,.89,.32,1.28) forwards}
@keyframes cheerPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(-8deg)}8%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(3deg)}15%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-55%) scale(.9)}}

/* Score popup */
.score-pop{position:absolute;z-index:35;pointer-events:none;font-weight:800;font-size:clamp(.85rem,2.8vw,1.2rem);white-space:nowrap;animation:scoreFly 1.4s ease-out forwards}
@keyframes scoreFly{0%{opacity:1;transform:translateX(-50%) scale(.7)}12%{transform:translateX(-50%) translateY(-10px) scale(1.1)}70%{opacity:1;transform:translateX(-50%) translateY(-20px)}100%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(.85)}}

/* Combo banner — contained */
#combo-banner{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);z-index:44;pointer-events:none;opacity:0;text-align:center;max-width:92%;width:92%}
.banner-anim{animation:bannerSlam 2.5s cubic-bezier(.17,.89,.32,1.28) forwards}
@keyframes bannerSlam{0%{opacity:0;transform:translate(-50%,-50%) scale(3)}5%{opacity:1;transform:translate(-50%,-50%) scale(.9)}10%{transform:translate(-50%,-50%) scale(1.05)}18%{transform:translate(-50%,-50%) scale(1)}82%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-55%) scale(.9)}}
.banner-num{font-size:clamp(1.8rem,7vw,3rem);font-weight:900;line-height:1.2;overflow:hidden;text-overflow:ellipsis}
.banner-label{font-size:clamp(.75rem,2.2vw,.95rem);font-weight:700;letter-spacing:.1em;opacity:.8;margin-top:4px}

/* Photo popup */
#photo-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:46;pointer-events:none;opacity:0;text-align:center;max-width:90%}
.photo-pop-anim{animation:photoPop 3s cubic-bezier(.17,.89,.32,1.28) forwards}
@keyframes photoPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-12deg)}6%{opacity:1;transform:translate(-50%,-50%) scale(1.05) rotate(2deg)}12%{transform:translate(-50%,-50%) scale(1)}78%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-55%) scale(.85)}}
#photo-popup img{width:clamp(120px,40vw,190px);height:clamp(120px,40vw,190px);object-fit:cover;border-radius:50%;border:5px solid #ffeb3b;box-shadow:0 0 40px rgba(255,235,59,.5),0 8px 30px rgba(0,0,0,.5)}
#photo-popup .photo-msg{margin-top:8px;font-size:clamp(.9rem,3vw,1.2rem);font-weight:900;color:#ffeb3b;text-shadow:0 2px 10px rgba(0,0,0,.6);max-width:100%;overflow:hidden}
#photo-popup.fever-photo img{border-color:#ff6b9d;box-shadow:0 0 50px rgba(255,107,157,.6),0 0 80px rgba(255,235,59,.3)}

/* Inline video — auto-plays without pausing game */
#inline-video{position:absolute;top:25%;left:50%;transform:translate(-50%,-50%);z-index:44;pointer-events:none;opacity:0;text-align:center}
.iv-anim{animation:ivPop 3.5s cubic-bezier(.17,.89,.32,1.28) forwards}
@keyframes ivPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-10deg)}6%{opacity:1;transform:translate(-50%,-50%) scale(1.05) rotate(2deg)}12%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-55%) scale(.85)}}
#inline-video video{width:clamp(100px,35vw,160px);height:clamp(100px,35vw,160px);object-fit:cover;border-radius:50%;border:4px solid #ffeb3b;box-shadow:0 0 30px rgba(255,235,59,.5)}
#inline-video .iv-msg{margin-top:6px;font-size:clamp(.8rem,2.5vw,1rem);font-weight:800;color:#ffeb3b;text-shadow:0 2px 8px rgba(0,0,0,.6)}

/* Video popup — tap to play */
#video-popup{position:absolute;inset:0;z-index:47;pointer-events:none;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
#video-popup.active{display:flex;pointer-events:auto;animation:vpFadeIn .3s ease}
@keyframes vpFadeIn{0%{opacity:0}100%{opacity:1}}
#video-popup .vp-circle{position:relative;cursor:pointer}
#video-popup video{width:clamp(160px,55vw,250px);height:clamp(160px,55vw,250px);object-fit:cover;border-radius:50%;border:5px solid #ffeb3b;box-shadow:0 0 40px rgba(255,235,59,.5),0 8px 30px rgba(0,0,0,.5)}
#video-popup .vp-play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;background:rgba(255,235,59,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,235,59,.5);transition:all .15s}
#video-popup .vp-play-btn::after{content:'';display:block;width:0;height:0;border-style:solid;border-width:12px 0 12px 22px;border-color:transparent transparent transparent #1a0a3e;margin-left:4px}
#video-popup .vp-play-btn:active{transform:translate(-50%,-50%) scale(.9)}
#video-popup.playing .vp-play-btn{display:none}
#video-popup .video-msg{margin-top:12px;font-size:clamp(1rem,3.5vw,1.4rem);font-weight:900;color:#ffeb3b;text-shadow:0 2px 10px rgba(0,0,0,.6)}
#video-popup .vp-hint{color:rgba(255,255,255,.5);font-size:.75rem;margin-top:6px}
#video-popup .vp-skip{margin-top:16px;padding:8px 24px;border:1.5px solid rgba(255,255,255,.25);border-radius:10px;background:transparent;color:rgba(255,255,255,.6);font-size:.8rem;cursor:pointer}

/* Fever overlays */
#fever-overlay{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:0;transition:opacity .5s;background:linear-gradient(135deg,rgba(255,100,200,.06),rgba(255,235,59,.06),rgba(100,200,255,.06));background-size:300% 300%;animation:feverShift 3s ease-in-out infinite}
@keyframes feverShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#fever-overlay.active{opacity:1}
#fever-border{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;transition:opacity .4s;border:3px solid transparent;border-image:linear-gradient(135deg,#ff6b9d,#ffa44f,#ffeb3b,#4fc3f7,#7c4dff,#ff6b9d) 1;animation:borderRainbow 2s linear infinite}
@keyframes borderRainbow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
#fever-border.active{opacity:1}

/* Title */
#title-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:linear-gradient(180deg,#1a0a3e 0%,#2a1a6e 50%,#4a2a8e 100%);padding:16px;overflow:hidden}
.title-photo{width:clamp(90px,26vw,130px);height:clamp(90px,26vw,130px);object-fit:cover;border-radius:50%;border:4px solid rgba(255,235,59,.6);box-shadow:0 0 25px rgba(255,235,59,.3);margin:12px 0;animation:titlePhotoFloat 3s ease-in-out infinite}
@keyframes titlePhotoFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
.title-logo{font-size:clamp(2.2rem,7vw,3.5rem);font-weight:900;background:linear-gradient(135deg,#ff6b9d,#ffa44f,#ffeb3b,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:titlePulse 2s ease-in-out infinite}
.title-sub{font-size:clamp(.85rem,2.4vw,1.2rem);color:#b8a9ff;margin-top:6px;font-weight:500}
@keyframes titlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.title-info{color:rgba(255,255,255,.45);font-size:.8rem;margin-top:8px;text-align:center;line-height:1.5}
.title-info strong{color:#ffeb3b;font-weight:700}
.title-streak{color:#ffa44f;font-size:.9rem;font-weight:700;margin-top:6px}
.mode-buttons{display:flex;flex-direction:column;gap:12px;margin-top:20px;width:85%;max-width:340px}
.mode-btn{padding:14px 18px;border:none;border-radius:18px;font-size:clamp(1rem,3vw,1.2rem);font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.mode-btn:active{transform:scale(.95)}
.mode-btn.adventure{background:linear-gradient(135deg,#ff6b9d,#ff8a65);color:#fff;box-shadow:0 5px 18px rgba(255,107,157,.4)}
.mode-btn.practice{background:linear-gradient(135deg,#4fc3f7,#7c4dff);color:#fff;box-shadow:0 5px 18px rgba(79,195,247,.4)}
.mode-btn .btn-desc{font-size:.6em;font-weight:400;opacity:.85;display:block;margin-top:2px}

/* Photo progress bar on title */
.photo-progress{width:80%;max-width:300px;margin-top:10px;text-align:center}
.photo-progress-label{color:rgba(255,255,255,.4);font-size:.7rem}
.photo-progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:4px;overflow:hidden}
.photo-progress-fill{height:100%;background:linear-gradient(90deg,#ffa44f,#ffeb3b);border-radius:3px;transition:width .5s}

/* Difficulty */
#difficulty-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:linear-gradient(180deg,#1a0a3e 0%,#2a1a6e 50%,#4a2a8e 100%);padding:20px}
#difficulty-screen h2{color:#fff;font-size:1.5rem;margin-bottom:16px}
.diff-grid{display:flex;flex-direction:column;gap:8px;width:90%;max-width:340px;max-height:55vh;overflow-y:auto;padding:4px}
.diff-btn{padding:12px 14px;border:none;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;color:#fff;text-align:left;display:flex;justify-content:space-between;align-items:center}
.diff-btn:active{transform:scale(.96)}
.diff-btn .diff-ops{font-size:.7rem;opacity:.7}
.diff-back{margin-top:14px;padding:10px 28px;border:2px solid rgba(255,255,255,.2);border-radius:12px;background:transparent;color:#fff;font-size:.95rem;cursor:pointer}

/* Game screen */
#game-screen{position:absolute;inset:0;display:none;flex-direction:column}
.hud{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;z-index:20;position:relative}
.hud-item{text-align:center;color:#fff;min-width:55px}
.hud-label{font-size:.55rem;opacity:.5;text-transform:uppercase;letter-spacing:.1em}
.hud-value{font-size:1.1rem;font-weight:800}
.hud-value.score-v{color:#ffeb3b}
.hud-value.level-v{color:#4fc3f7}
.score-bump{animation:scoreBump .25s ease}
@keyframes scoreBump{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.mascot{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:1.8rem;z-index:21;transition:all .3s;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}
.mascot.happy{animation:mH .4s ease}
.mascot.sad{animation:mS .4s ease}
.mascot.fire{animation:mF .5s ease}
.mascot.dance{animation:mD .6s ease}
@keyframes mH{0%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.4) rotate(10deg)}100%{transform:translateX(-50%) scale(1)}}
@keyframes mS{0%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(.8) rotate(-5deg)}100%{transform:translateX(-50%) scale(1)}}
@keyframes mF{0%{transform:translateX(-50%) scale(1)}30%{transform:translateX(-50%) scale(1.6) rotate(15deg)}60%{transform:translateX(-50%) scale(1.3) rotate(-10deg)}100%{transform:translateX(-50%) scale(1)}}
@keyframes mD{0%{transform:translateX(-50%) scale(1)}25%{transform:translateX(-40%) scale(1.3) rotate(15deg)}50%{transform:translateX(-60%) scale(1.3) rotate(-15deg)}75%{transform:translateX(-45%) scale(1.3) rotate(10deg)}100%{transform:translateX(-50%) scale(1)}}
.level-bar{height:3px;background:rgba(255,255,255,.08);margin:0 14px;border-radius:2px;overflow:hidden}
.level-bar-fill{height:100%;background:linear-gradient(90deg,#4fc3f7,#7c4dff);transition:width .3s;border-radius:2px}
#game-container.fever .level-bar-fill{background:linear-gradient(90deg,#ff6b9d,#ffa44f,#ffeb3b,#4fc3f7);background-size:200% 100%;animation:rainbowBar 1s linear infinite}
@keyframes rainbowBar{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.game-field{flex:1;position:relative;overflow:hidden}
.lanes-bg{position:absolute;inset:0;display:flex;pointer-events:none}
.lane-bg{flex:1;border-right:1px solid rgba(255,255,255,.025)}.lane-bg:last-child{border-right:none}
.hit-zone{position:absolute;left:0;right:0;height:80px;z-index:5;pointer-events:none}
.hit-zone-bar{position:absolute;top:50%;left:10px;right:10px;height:4px;transform:translateY(-50%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);border-radius:2px;transition:all .3s}
#game-container.fever .hit-zone-bar{height:5px;background:linear-gradient(90deg,transparent,rgba(255,235,59,.7),transparent);box-shadow:0 0 15px rgba(255,235,59,.3)}
.hit-zone-area{position:absolute;inset:0;background:linear-gradient(180deg,transparent 10%,rgba(255,255,255,.025) 50%,transparent 90%);animation:hzP 2s ease-in-out infinite}
@keyframes hzP{0%,100%{opacity:.4}50%{opacity:1}}
.note{position:absolute;width:calc(25% - 12px);height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:clamp(.9rem,3vw,1.25rem);font-weight:800;color:#fff;z-index:10;pointer-events:none;will-change:top}
.note-inner{position:relative;z-index:2;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.note-bg{position:absolute;inset:0;border-radius:13px;opacity:.92}
.note-glow{position:absolute;inset:-3px;border-radius:16px;opacity:.35;filter:blur(6px)}
.note.in-zone .note-glow{opacity:.7;animation:nzg .5s ease-in-out infinite alternate}
@keyframes nzg{0%{opacity:.5;inset:-3px}100%{opacity:.8;inset:-8px}}
.note.hit{animation:nHit .35s ease-out forwards}
.note.miss-anim{animation:nMiss .8s ease-out forwards}
@keyframes nHit{0%{transform:translateX(-50%) scale(1);opacity:1}50%{transform:translateX(-50%) scale(1.8);opacity:.7}100%{transform:translateX(-50%) scale(2.2);opacity:0}}
@keyframes nMiss{0%{opacity:1;filter:saturate(1)}25%{filter:saturate(0) brightness(.5)}100%{transform:translateX(-50%) translateY(12px);opacity:0;filter:saturate(0) brightness(.3)}}
.note[data-lane="0"] .note-bg,.note[data-lane="0"] .note-glow{background:#ff6b9d}
.note[data-lane="1"] .note-bg,.note[data-lane="1"] .note-glow{background:#ffa44f}
.note[data-lane="2"] .note-bg,.note[data-lane="2"] .note-glow{background:#4fc3f7}
.note[data-lane="3"] .note-bg,.note[data-lane="3"] .note-glow{background:#7c4dff}
.feedback{position:absolute;left:50%;font-weight:900;font-size:clamp(1.1rem,3.5vw,1.5rem);z-index:30;pointer-events:none;animation:fbP 1.5s ease-out forwards;text-shadow:0 2px 8px rgba(0,0,0,.5);white-space:nowrap;max-width:60%;overflow:hidden;text-overflow:ellipsis}
@keyframes fbP{0%{opacity:1;transform:translateX(-50%) scale(.5)}10%{transform:translateX(-50%) translateY(-8px) scale(1.1)}20%{transform:translateX(-50%) translateY(-14px) scale(1)}75%{opacity:1;transform:translateX(-50%) translateY(-18px)}100%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(.85)}}
.feedback.small{font-size:clamp(.85rem,2.8vw,.95rem);max-width:70%}
.combo-display{position:absolute;top:50%;right:10px;transform:translateY(-50%);z-index:25;pointer-events:none;text-align:right;opacity:0;transition:opacity .3s}
.combo-display.visible{opacity:1}
.combo-num{font-size:2.2rem;font-weight:900;color:#ff6b9d;line-height:1;text-shadow:0 0 20px rgba(255,107,157,.5);transition:all .2s}
.combo-label{font-size:.6rem;color:rgba(255,255,255,.5);letter-spacing:.1em}
.combo-display.on-fire .combo-num{color:#ffeb3b;font-size:2.6rem;text-shadow:0 0 30px rgba(255,235,59,.6),0 0 60px rgba(255,100,50,.3)}
.combo-display.on-fire .combo-label{color:#ffeb3b;opacity:.7}
.answer-area{padding:8px 8px 18px;z-index:20;position:relative;background:linear-gradient(180deg,transparent,rgba(0,0,0,.25))}
.answer-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.answer-btn{height:clamp(52px,13vw,72px);border:none;border-radius:13px;font-size:clamp(1.3rem,4.2vw,1.9rem);font-weight:900;color:#fff;cursor:pointer;position:relative;overflow:hidden;transition:all .08s}
.answer-btn:active:not(.disabled):not(.wrong){transform:scale(.9)}
.answer-btn[data-slot="0"]{background:linear-gradient(145deg,#ff6b9d,#e91e63);box-shadow:0 3px 10px rgba(255,107,157,.3)}
.answer-btn[data-slot="1"]{background:linear-gradient(145deg,#ffa44f,#f57c00);box-shadow:0 3px 10px rgba(255,164,79,.3)}
.answer-btn[data-slot="2"]{background:linear-gradient(145deg,#4fc3f7,#0288d1);box-shadow:0 3px 10px rgba(79,195,247,.3)}
.answer-btn[data-slot="3"]{background:linear-gradient(145deg,#7c4dff,#4527a0);box-shadow:0 3px 10px rgba(124,77,255,.3)}
.answer-btn.wrong{animation:bShk .35s ease;opacity:.3;pointer-events:none}
.answer-btn.correct-flash{animation:bFl .3s ease}
.answer-btn.disabled{opacity:.25;pointer-events:none}
@keyframes bShk{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
@keyframes bFl{0%{transform:scale(.9)}30%{transform:scale(1.18)}50%{transform:scale(.97)}70%{transform:scale(1.05)}100%{transform:scale(1)}}
/* Hint glow on correct answer button for first note */
.answer-btn.hint-glow{animation:hintGlow 1s ease-in-out infinite}
@keyframes hintGlow{0%,100%{box-shadow:0 0 8px rgba(255,235,59,.3)}50%{box-shadow:0 0 25px rgba(255,235,59,.7),0 0 40px rgba(255,235,59,.3)}}
/* Wonder mode */
.note.wonder .note-bg{background:linear-gradient(135deg,#ff6b9d,#ffa44f,#ffeb3b,#4fc3f7,#7c4dff)!important;background-size:400% 400%!important;animation:wonderNote 1s linear infinite!important}
@keyframes wonderNote{0%{background-position:0% 50%}100%{background-position:400% 50%}}
/* Positive micro-shake for PERFECT */
.micro-shake{animation:microShk .1s ease}
@keyframes microShk{0%{transform:translate(0)}50%{transform:translate(1px,-1px)}100%{transform:translate(0)}}
/* Boss note */
.note.boss{width:calc(30% - 12px)!important;height:64px!important;border:2px solid #ffd700;font-size:clamp(1.1rem,3.5vw,1.5rem)!important}
.note.boss .note-bg{background:linear-gradient(135deg,#ffd700,#ffab00)!important}
.note.boss .note-glow{background:#ffd700!important;opacity:.6!important;filter:blur(10px)!important;animation:bossGlow .6s ease-in-out infinite alternate!important}
@keyframes bossGlow{0%{opacity:.4;inset:-5px}100%{opacity:.8;inset:-12px}}
/* Bonus round indicator */
#bonus-indicator{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:22;pointer-events:none;opacity:0;transition:opacity .3s;text-align:center}
#bonus-indicator.active{opacity:1}
.bonus-text{font-size:clamp(.8rem,2.5vw,1rem);font-weight:800;color:#ffeb3b;text-shadow:0 0 15px rgba(255,235,59,.5);animation:bonusPulse .8s ease-in-out infinite alternate}
@keyframes bonusPulse{0%{transform:scale(1)}100%{transform:scale(1.08)}}
/* Chain text */
.chain-pop{position:absolute;z-index:36;pointer-events:none;font-weight:900;font-size:clamp(.75rem,2.5vw,1rem);color:#ffa44f;animation:chainFly 1s ease-out forwards;white-space:nowrap}
@keyframes chainFly{0%{opacity:1;transform:translateX(-50%) scale(.8)}15%{transform:translateX(-50%) scale(1.15)}70%{opacity:1;transform:translateX(-50%) translateY(-15px)}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}
/* World name banner */
#world-banner{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);z-index:46;pointer-events:none;opacity:0;text-align:center}
.world-banner-anim{animation:worldBanner 2.5s ease-out forwards}
@keyframes worldBanner{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}8%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}15%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-55%)}}
.world-name{font-size:clamp(1.5rem,5vw,2.2rem);font-weight:900;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.4)}
.world-sub{font-size:clamp(.7rem,2vw,.9rem);color:rgba(255,255,255,.6);margin-top:4px}
.finish-btn{position:absolute;top:8px;left:10px;padding:5px 12px;border:1.5px solid rgba(255,255,255,.25);border-radius:9px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:.7rem;font-weight:600;cursor:pointer;z-index:25}
.pause-btn{position:absolute;top:8px;right:10px;width:34px;height:34px;border:none;background:rgba(255,255,255,.08);border-radius:50%;color:rgba(255,255,255,.6);font-size:.95rem;cursor:pointer;z-index:25;display:flex;align-items:center;justify-content:center}
#pause-overlay{position:absolute;inset:0;background:rgba(0,0,0,.75);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(6px)}
#pause-overlay h2{color:#fff;font-size:1.6rem;margin-bottom:18px}
.pause-menu-btn{padding:11px 32px;margin:5px;border:none;border-radius:13px;font-size:.95rem;font-weight:700;cursor:pointer;color:#fff;min-width:170px}
.pause-menu-btn:active{transform:scale(.95)}
.pause-menu-btn.resume{background:linear-gradient(135deg,#4fc3f7,#7c4dff)}
.pause-menu-btn.quit{background:rgba(255,255,255,.12)}

/* Result */
#result-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:linear-gradient(180deg,#1a0a3e 0%,#2a1a6e 50%,#4a2a8e 100%);padding:16px;overflow-y:auto}
.result-photo{width:clamp(80px,24vw,110px);height:clamp(80px,24vw,110px);object-fit:cover;border-radius:50%;border:4px solid #ffeb3b;box-shadow:0 0 20px rgba(255,235,59,.3);margin:6px 0;animation:rpGlow 2s ease-in-out infinite alternate}
@keyframes rpGlow{0%{box-shadow:0 0 12px rgba(255,235,59,.2)}100%{box-shadow:0 0 30px rgba(255,235,59,.5)}}
.result-title{font-size:clamp(1.5rem,5vw,2.4rem);font-weight:900;color:#ffeb3b;margin-bottom:4px;animation:rBounce 1s ease;max-width:95%;text-align:center;overflow:hidden}
@keyframes rBounce{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1);opacity:1}}
.result-stars{display:flex;gap:8px;margin:10px 0;font-size:clamp(2rem,6.5vw,3rem)}
.result-star{opacity:.15;transform:scale(.5);transition:all .4s}
.result-star.earned{opacity:1;transform:scale(1);animation:sP .6s ease}
@keyframes sP{0%{transform:scale(0) rotate(-180deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1)}}
.result-stats{background:rgba(255,255,255,.07);border-radius:16px;padding:14px 20px;margin:10px 0;width:92%;max-width:300px}
.stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);color:#fff;font-size:.85rem}
.stat-row:last-child{border-bottom:none}.stat-label{opacity:.6}.stat-value{font-weight:700}
.result-msg{font-size:clamp(.85rem,2.5vw,1.05rem);color:#c8b8ff;margin:8px 0;text-align:center;padding:0 12px;line-height:1.6;white-space:pre-line;max-width:95%}
.new-record{font-size:clamp(1rem,3.5vw,1.4rem);font-weight:900;background:linear-gradient(135deg,#ffeb3b,#ffa44f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:recP 1s ease-in-out infinite alternate;margin:6px 0}
@keyframes recP{0%{transform:scale(1)}100%{transform:scale(1.06)}}
.result-unlock{background:rgba(255,235,59,.1);border:1px solid rgba(255,235,59,.2);border-radius:12px;padding:10px 16px;margin:8px 0;text-align:center;color:#ffeb3b;font-size:.9rem}
.result-buttons{display:flex;flex-direction:column;gap:8px;margin-top:12px;width:85%;max-width:300px}
.result-btn{padding:13px;border:none;border-radius:13px;font-size:1.05rem;font-weight:700;cursor:pointer;color:#fff}
.result-btn:active{transform:scale(.95)}
.result-btn.retry{background:linear-gradient(135deg,#ff6b9d,#ff8a65);box-shadow:0 3px 12px rgba(255,107,157,.3)}
.result-btn.home{background:rgba(255,255,255,.1)}

#particle-canvas{position:absolute;inset:0;z-index:40;pointer-events:none}
#levelup-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:45;pointer-events:none}
.levelup-text{font-size:clamp(1.8rem,6vw,3rem);font-weight:900;color:#ffeb3b;text-shadow:0 0 30px rgba(255,235,59,.5);animation:lvU 1.5s ease-out forwards;white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis}
@keyframes lvU{0%{transform:scale(0) rotate(-10deg);opacity:0}25%{transform:scale(1.2) rotate(3deg);opacity:1}65%{transform:scale(1);opacity:1}100%{transform:translateY(-15px);opacity:0}}
.shake{animation:shk .3s ease}
@keyframes shk{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(2px,-2px)}75%{transform:translate(-1px,1px)}}
#countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:60;background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}
.cd-num{font-size:clamp(4.5rem,16vw,6.5rem);font-weight:900;color:#fff;animation:cdP .75s ease-out forwards}
@keyframes cdP{0%{transform:scale(2.5);opacity:0}25%{transform:scale(1);opacity:1}80%{opacity:1}100%{opacity:0;transform:scale(.7)}}
@media(max-height:600px){.answer-btn{height:44px;font-size:1.1rem}.note{height:40px;font-size:.85rem}.hud{padding:3px 10px}}
@media(min-width:501px){#game-container{border-radius:20px;height:min(100vh,900px);box-shadow:0 0 60px rgba(124,77,255,.2)}}
</style>

<script>
var LANE_COLORS=['#ff6b9d','#ffa44f','#4fc3f7','#7c4dff'];
var LANES=4,HIT_Y=0.86,WIN_PERFECT=0.035,WIN_GREAT=0.07,WIN_GOOD=0.12;

];

/* ===== WORLD THEMES — visual journey every 2 levels ===== */
var WORLDS=[
  {name:'🌌 うちゅう',bg:'linear-gradient(180deg,#0a0a2e 0%,#1a1a4e 40%,#2a1a5e 100%)',lane:'rgba(255,255,255,.025)',bar:'#7c4dff'},
  {name:'🌊 うみのなか',bg:'linear-gradient(180deg,#0a2a3e 0%,#0a4a6e 40%,#0a3a5e 100%)',lane:'rgba(79,195,247,.04)',bar:'#4fc3f7'},
  {name:'🌴 ジャングル',bg:'linear-gradient(180deg,#0a2e0a 0%,#1a4e1a 40%,#2a5e1a 100%)',lane:'rgba(102,187,106,.04)',bar:'#66bb6a'},
  {name:'🌋 かざん',bg:'linear-gradient(180deg,#2e0a0a 0%,#4e1a0a 40%,#5e2a1a 100%)',lane:'rgba(255,107,107,.04)',bar:'#ff6b6b'},

];

  {emoji:'😊',name:'スマイル',need:0},{emoji:'🐱',name:'ネコ',need:20},{emoji:'🐶',name:'イヌ',need:50},
  {emoji:'🦊',name:'キツネ',need:100},{emoji:'🐼',name:'パンダ',need:200},{emoji:'🦄',name:'ユニコーン',need:400},
  {emoji:'🐉',name:'ドラゴン',need:700},{emoji:'👾',name:'エイリアン',need:1000},{emoji:'🤖',name:'ロボット',need:1500},{emoji:'👑',name:'キング',need:2500}
];

/* ===== STATE ===== */
var S;function resetState(){return{mode:'adventure',paused:false,running:false,screen:'title',
  score:0,combo:0,maxCombo:0,level:0,notesInLvl:0,total:0,perfect:0,great:0,good:0,miss:0,
  notes:[],active:null,choices:[],wrongSlots:new Set(),retries:0,lastSpawn:0,fieldH:0,practiceLevel:0,

var $=function(id){return document.getElementById(id)};
var root=$('game-container'),field=$('game-field'),btnsWrap=$('answer-buttons'),cvs=$('particle-canvas'),cx=cvs.getContext('2d');

/* ===== AUDIO ===== */
var ac=null;
function ensureAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume()}
function tone(f,d,t,v){d=d||.12;t=t||'sine';v=v||.22;if(!ac)return;var n=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.setValueAtTime(f,n);g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.001,n+d);o.connect(g).connect(ac.destination);o.start(n);o.stop(n+d)}
function chord(fs,d,v){fs.forEach(function(f){tone(f,d||.2,'sine',v||.12)})}
var sfx={
  perfect:function(){tone(880,.1);setTimeout(function(){tone(1100,.1)},60);setTimeout(function(){tone(1320,.15,'sine',.25)},120)},
  great:function(){tone(660,.1);setTimeout(function(){tone(880,.12)},70)},

};

/* ===== PARTICLES ===== */
var particles=[];
function P(x,y,c,big){this.x=x;this.y=y;this.c=c;var f=big?14:9;this.vx=(Math.random()-.5)*f;this.vy=(Math.random()-.5)*f-(big?4:2.5);this.life=1;this.dec=big?.01:.014+Math.random()*.018;this.sz=big?3+Math.random()*8:2+Math.random()*5}
P.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;this.vy+=.11;this.vx*=.99;this.life-=this.dec;this.sz*=.987};
P.prototype.draw=function(c){if(this.life<=0)return;c.globalAlpha=Math.max(0,this.life);c.fillStyle=this.c;c.beginPath();c.arc(this.x,this.y,this.sz,0,Math.PI*2);c.fill()};
function emit(x,y,c,n){for(var i=0;i<(n||18);i++)particles.push(new P(x,y,c,false))}
function emitBig(x,y,n){var cs=['#ffeb3b','#ff6b9d','#4fc3f7','#7c4dff','#ff8a65','#66bb6a','#fff'];for(var i=0;i<(n||30);i++)particles.push(new P(x,y,cs[~~(Math.random()*cs.length)],true))}
function emitShower(){for(var i=0;i<12;i++){var p=new P(Math.random()*cvs.width,-10,['#ffeb3b','#ff6b9d','#4fc3f7','#7c4dff'][~~(Math.random()*4)],true);p.vy=Math.random()*5+2;p.vx=(Math.random()-.5)*3;p.dec=.008;particles.push(p)}}

/* ===== MATH ===== */
function rand(a,b){return~~(Math.random()*(b-a+1))+a}
function genProblem(lv){var d=DIFF[Math.min(lv,DIFF.length-1)],op=d.ops[~~(Math.random()*d.ops.length)],a,b,ans,txt;
  switch(op){case'+':a=rand(d.minA,d.maxA);b=rand(d.minB,d.maxB);ans=a+b;txt=a+' + '+b;break;
    case'-':a=rand(d.minA,d.maxA);b=rand(d.minB,Math.min(d.maxB,a));ans=a-b;txt=a+' − '+b;break;
    case'×':a=rand(d.minA,Math.min(d.maxA,9));b=rand(d.minB,Math.min(d.maxB,9));ans=a*b;txt=a+' × '+b;break;
    case'÷':b=rand(Math.max(d.minB,2),Math.min(d.maxB,9));ans=rand(1,Math.min(~~(d.maxA/b),10));a=ans*b;txt=a+' ÷ '+b;break}
  return{txt:txt,ans:ans}}
function genChoices(correct){var s=new Set([correct]);
  var c=correct+(Math.random()>.5?1:-1)*(Math.random()>.5?1:2);if(c>=0&&c!==correct)s.add(c);
  var m=correct+(Math.random()>.5?-1:1);if(m>=0&&m!==correct)s.add(m);
  var tries=0;while(s.size<4&&tries<60){var off=rand(2,6)*(Math.random()>.5?1:-1),w=correct+off;if(w<0)w=correct+Math.abs(off);if(w!==correct)s.add(w);tries++}
  while(s.size<4)s.add(correct+s.size);
  var a=Array.from(s);for(var i=a.length-1;i>0;i--){var j=~~(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

/* ===== PERSISTENCE ===== */
function getTotalCorrect(){return Number(localStorage.getItem('mb_total'))||0}
function addTotalCorrect(n){var t=getTotalCorrect()+n;localStorage.setItem('mb_total',t);return t}
function getActiveMascot(){var i=Number(localStorage.getItem('mb_mascot'))||0;return MASCOT_COLLECTION[Math.min(i,MASCOT_COLLECTION.length-1)]}
function checkNewUnlock(prev,cur){for(var i=0;i<MASCOT_COLLECTION.length;i++){var m=MASCOT_COLLECTION[i];if(prev<m.need&&cur>=m.need)return m}return null}
function getUnlockedCount(){var t=getTotalCorrect();var c=0;MASCOT_COLLECTION.forEach(function(m){if(t>=m.need)c++});return c}

/* Daily streak — behavioral hook: loss aversion */
function getStreak(){var data=JSON.parse(localStorage.getItem('mb_streak')||'{"count":0,"last":""}');
  var today=new Date().toDateString();
  var yesterday=new Date(Date.now()-86400000).toDateString();
  if(data.last===today)return data.count;
  if(data.last===yesterday)return data.count; // will increment on play
  return 0} // streak broken
function updateStreak(){var data=JSON.parse(localStorage.getItem('mb_streak')||'{"count":0,"last":""}');
  var today=new Date().toDateString();if(data.last===today)return data.count;
  var yesterday=new Date(Date.now()-86400000).toDateString();
  var newCount=(data.last===yesterday)?data.count+1:1;
  localStorage.setItem('mb_streak',JSON.stringify({count:newCount,last:today}));return newCount}

/* Next photo unlock threshold — Zeigarnik effect */
var PHOTO_THRESHOLDS=[10,25,50,80,120,170,230,300];
function getPhotoUnlockCount(){var t=getTotalCorrect(),c=0;PHOTO_THRESHOLDS.forEach(function(th){if(t>=th)c++});return c}
function getNextPhotoThreshold(){var t=getTotalCorrect();for(var i=0;i<PHOTO_THRESHOLDS.length;i++){if(t<PHOTO_THRESHOLDS[i])return PHOTO_THRESHOLDS[i]}return null}

/* DDA */
function trackDDA(h){S.recentHits.push(h);if(S.recentHits.length>8)S.recentHits.shift()}
function updateDDA(){if(S.recentHits.length<4)return;var acc=S.recentHits.filter(Boolean).length/S.recentHits.length;
  if(acc<.6)S.ddaSpeedMult=Math.max(S.ddaSpeedMult-.003,.75);
  else if(acc>.9)S.ddaSpeedMult=Math.min(S.ddaSpeedMult+.002,1.15);
  else S.ddaSpeedMult+=(1-S.ddaSpeedMult)*.01}

/* Loop */
var lastT=0;
function loop(now){if(!S.running)return;if(S.paused){requestAnimationFrame(loop);return}
  var dt=Math.min((now-(lastT||now))/1000,.05);lastT=now;
  var d=DIFF[Math.min(S.level,DIFF.length-1)];updateDDA();
  var baseSpd=S.mode==='practice'?d.spd*.55:d.spd;
  // First note: 40% speed (Miyamoto: safe first moment)
  if(S.total<=1)baseSpd*=.7;
  else if(S.total<=3)baseSpd*=.85;
  var spd=baseSpd*S.ddaSpeedMult;
  var spawnMs=(S.mode==='practice'?d.ms*1.4:d.ms)/S.ddaSpeedMult;
  // === MULTI-NOTE SPAWN (pro rhythm game feel) ===
  // Lv0-3: single note (wait until answered)
  // Lv4-6: spawn next when previous passes 40% of field
  // Lv7+: spawn next when previous passes 30%
  var canSpawn=false;
  if(now-S.lastSpawn>spawnMs){
    if(!S.active){canSpawn=true}
    else if(S.level>=4){
      var threshold=S.level>=7?0.30:0.40;
      var activeHasPassed=S.active&&S.active.prog>=threshold;
      var pendingCount=S.notes.filter(function(nn){return!nn.done}).length;
      var maxOnScreen=S.level>=7?3:2;
      if(activeHasPassed&&pendingCount<maxOnScreen)canSpawn=true;
    }
  }
  if(canSpawn){spawnNote();S.lastSpawn=now}

  // Update all notes
  for(var i=0;i<S.notes.length;i++){var n=S.notes[i];if(n.done)continue;
    n.prog+=spd*dt;if(n.el)n.el.style.top=(n.prog*S.fieldH-27)+'px';
    if(!n.done&&n.prog>=HIT_Y-WIN_GOOD&&n.prog<=HIT_Y+WIN_GOOD)n.el.classList.add('in-zone');
    if(!n.done&&n.prog>HIT_Y+WIN_GOOD)doMiss(n)}
  S.notes=S.notes.filter(function(n){if(n.done&&n.removeAt&&now>n.removeAt){if(n.el)n.el.remove();return false}return true});
  if(S.fever&&Math.random()<.12)emitShower();
  for(var j=0;j<particles.length;j++)particles[j].update();
  particles=particles.filter(function(p){return p.life>0});
  cx.clearRect(0,0,cvs.width,cvs.height);cx.globalAlpha=1;
  for(var k=0;k<particles.length;k++)particles[k].draw(cx);cx.globalAlpha=1;
  if(S.mode==='adventure'&&S.miss>=MAX_MISS){endGame();return}
  requestAnimationFrame(loop)}

/* Notes — with Kishōtenketsu pacing & Wonder Moments */
function spawnNote(){
  S.totalProblems++;
  var lane=~~(Math.random()*LANES);
  // === KISHŌTENKETSU: 4-act level structure ===
  var pos=S.notesInLvl; // position within current level (0-9)
  var effectiveLvl=S.level;
  if(pos<2){effectiveLvl=Math.max(0,S.level-1)} // Ki: easier warmup
  // Shō (pos 2-5): normal — no change
  // Ten (pos 6-7): handled by Wonder below
  // Ketsu (pos 8-9): normal with anticipation

  // === WONDER MOMENT (Mario Wonder): every 20-30 problems or at "Ten" position ===
  if(!S.wonderActive&&S.totalProblems>5&&(S.totalProblems%~~(20+Math.random()*10)===0||(pos===6&&Math.random()<.4))){
    var wt=WONDER_TYPES[~~(Math.random()*WONDER_TYPES.length)];
    S.wonderActive=true;S.wonderLeft=3;
    showBanner('⭐ '+wt.name,wt.desc,'#ffeb3b');sfx.milestone();
    S._wonderEffect=wt.effect;
  }

  // Bonus round: use level 0 (easy) problems
  if(S.bonusRound)effectiveLvl=0;

  var prob=genProblem(effectiveLvl);
  var isBoss=(!S.bonusRound&&pos===LVL_NOTES-1&&S.mode==='adventure'); // Last note in level = boss
  var el=document.createElement('div');el.className='note';el.dataset.lane=lane;
  if(isBoss)el.classList.add('boss');
  el.style.left=(lane*25+12.5)+'%';el.style.transform='translateX(-50%)'+(isBoss?' scale(1.15)':'');

  // Wonder visual effects
  if(S.wonderActive){
    el.classList.add('wonder');
    if(S._wonderEffect==='giant')el.style.transform='translateX(-50%) scale(1.4)';
    S.wonderLeft--;if(S.wonderLeft<=0)S.wonderActive=false;
  }

  el.innerHTML='<div class="note-bg"></div><div class="note-glow"></div><div class="note-inner">'+prob.txt+'</div>';
  field.appendChild(el);
  var n={lane:lane,prob:prob,prog:-.05,done:false,el:el,removeAt:null,isWonder:el.classList.contains('wonder'),isBoss:isBoss};
  S.notes.push(n);S.total++;
  // Only activate if no other note is currently active (multi-note support)
  if(!S.active)activate(n);

  // === FIRST NOTE: slow + hint glow on correct answer (Miyamoto's safe Goomba) ===
  if(S.total===1){
    var correctIdx=S.choices.indexOf(prob.ans);
    if(correctIdx>=0)btnsWrap.children[correctIdx].classList.add('hint-glow');
  }
}
function activate(n){S.active=n;S.choices=genChoices(n.prob.ans);S.wrongSlots=new Set();S.retries=MAX_RETRY;
  for(var i=0;i<4;i++){var b=btnsWrap.children[i];b.textContent=S.choices[i];b.className='answer-btn';b.dataset.slot=i}}
function activateNext(){
  // Find the lowest (closest to hit zone) non-done note — activate it regardless of position
  var best=null;
  for(var i=0;i<S.notes.length;i++){var nn=S.notes[i];if(!nn.done){if(!best||nn.prog>best.prog)best=nn}}
  if(best)activate(best);else disableBtns()
}
function clearField(){field.querySelectorAll('.note,.feedback,.score-pop').forEach(function(e){e.remove()})}

/* Answer */
for(var i=0;i<4;i++)(function(i){btnsWrap.children[i].addEventListener('pointerdown',function(e){e.preventDefault();tapAnswer(i)})})(i);
function tapAnswer(slot){if(!S.running||S.paused||!S.active)return;ensureAudio();
  if(S.wrongSlots.has(slot))return;
  S.choices[slot]===S.active.prob.ans?doCorrect(S.active,slot):doWrong(S.active,slot)}

function doCorrect(n,slot){
  var dist=Math.abs(n.prog-HIT_Y),rating,pts,fx,col;
  if(n.prog<HIT_Y-WIN_GOOD){rating='GOOD!';pts=50;fx=sfx.good;col='#66bb6a';S.good++;setMascot('happy')}
  else if(dist<WIN_PERFECT){rating='PERFECT!';pts=100;fx=sfx.perfect;col='#ffeb3b';S.perfect++;setMascot('perfect')}
  else if(dist<WIN_GREAT){rating='GREAT!';pts=75;fx=sfx.great;col='#4fc3f7';S.great++;setMascot('happy')}
  else{rating='GOOD!';pts=50;fx=sfx.good;col='#66bb6a';S.good++;setMascot('happy')}
  pts=Math.max(pts-(MAX_RETRY-S.retries)*15,10);trackDDA(true);
  S.combo++;S.sessionCorrect++;if(S.combo>S.maxCombo)S.maxCombo=S.combo;
  if(S.fever)pts*=2;
  if(n.isWonder&&S._wonderEffect==='triple')pts*=3;
  if(S.bonusRound)pts*=2; // Bonus round double
  // Boss note: 5x points!
  var isBoss=n.el&&n.el.classList.contains('boss');
  if(isBoss)pts*=5;
  // Chain bonus: answer within 1s of last correct
  var now2=performance.now();
  if(S.lastCorrectTime&&now2-S.lastCorrectTime<1000){S.chainCount++;pts+=S.chainCount*10}else{S.chainCount=0}
  S.lastCorrectTime=now2;

  pts=~~(pts*(1+~~(S.combo/5)*.5));S.score+=pts;
  fx();if(S.combo>1)sfx.combo(S.combo);
  // Chain visual
  if(S.chainCount>=2){var ce=document.createElement('div');ce.className='chain-pop';ce.textContent='CHAIN x'+S.chainCount+'!';ce.style.color='#ffa44f';ce.style.left=(n.lane*25+12.5)+'%';ce.style.top=(HIT_Y*S.fieldH-100)+'px';field.appendChild(ce);setTimeout(function(){ce.remove()},1000)}
  if(rating==='PERFECT!'){flashEl.className='flash-perfect';reA(flashEl);root.classList.add('micro-shake');setTimeout(function(){root.classList.remove('micro-shake')},100)}
  else if(rating==='GREAT!'){flashEl.className='flash-great';reA(flashEl)}
  var popTxt='+'+pts;if(isBoss)popTxt='BOSS! +'+pts;else if(n.isWonder&&S._wonderEffect==='triple')popTxt='+'+pts+' x3!';
  showScorePop(n,popTxt,isBoss?'#ffd700':col);
  // Remove first-note hint glow
  for(var hi=0;hi<4;hi++)btnsWrap.children[hi].classList.remove('hint-glow');

  // Random cheer ~50% on PERFECT
  if(rating==='PERFECT!'&&Math.random()<.5)showCheer(CHEERS[~~(Math.random()*CHEERS.length)],col);

  // === EARLY HOOKS — 最初の15秒で動画/写真を出す ===
  if(S.sessionCorrect===1){setTimeout(function(){showPhoto('photo-kantarou.jpg',NAME+' 1もんめ せいかい!')},200)}
  // 3問連続 → パパ動画(タップ再生+音声)
  else if(S.combo===3){var dv=DAD_VIDEOS[~~(Math.random()*DAD_VIDEOS.length)];setTimeout(function(){showVideo(dv.src,'3れんぞく! パパ うれしい!')},200)}
  else if(S.sessionCorrect===5){setTimeout(function(){showPhoto('photo-family.jpg',NAME+' 5もん せいかい!')},200)}
  // 7問目 → パパ動画
  else if(S.sessionCorrect===7){var dv7=DAD_VIDEOS[~~(Math.random()*DAD_VIDEOS.length)];setTimeout(function(){showVideo(dv7.src,NAME+' すごいよ!')},200)}

  // Combo milestones — photo only (no video here, to avoid double-fire with FEVER)
  var isMilestone=!!COMBO_MILESTONES[S.combo];
  if(isMilestone){var ms=COMBO_MILESTONES[S.combo];
    showBanner(S.combo+' COMBO!',ms.label,ms.color);sfx.milestone();emitBig(cvs.width/2,cvs.height/2,40);
    if(S.combo>=5&&S.combo!==10){// Skip photo at 10 — FEVER handles the celebration
      var photos=[{s:'photo-beach.jpg',m:'うみ たのしかった!'},{s:'photo-ski.jpg',m:'スキー またいこう!'},{s:'photo-stadium.jpg',m:'サッカー さいこう!'},{s:'photo-birthday.jpg',m:'おいわい!🎂'},{s:'photo-seaplane.jpg',m:'そらをとぼう!✈️'}];
      var pick=photos[~~(Math.random()*photos.length)];setTimeout(function(){showPhoto(pick.s,pick.m)},700)}}

  // ランダム報酬 15% — 25% inline video, 75% photo
  if(!isMilestone&&S.sessionCorrect>1&&S.combo!==3&&S.sessionCorrect!==7&&Math.random()<.15){
    if(Math.random()<.2){var dvr=DAD_VIDEOS[~~(Math.random()*DAD_VIDEOS.length)];setTimeout(function(){showVideo(dvr.src,'パパ おうえんしてるよ!')},200)}
    else{var rp=PHOTOS[~~(Math.random()*PHOTOS.length)];setTimeout(function(){showPhoto(rp.src,rp.msg)},200)}}

  if(S.combo>=10&&!S.fever)enterFever();
  if(S.combo>=10)setMascot('fire');

  n.el.classList.add('hit');n.done=true;n.removeAt=performance.now()+500;S.active=null;
  showFB(n,rating,col);
  var r=n.el.getBoundingClientRect(),cr=cvs.getBoundingClientRect();
  var px=r.left+r.width/2-cr.left,py=r.top+r.height/2-cr.top;
  emit(px,py,LANE_COLORS[n.lane],rating==='PERFECT!'?25:14);
  if(S.combo>=5)emitBig(px,py,Math.min(8+S.combo*2,50));
  btnsWrap.children[slot].classList.add('correct-flash');
  setTimeout(function(){btnsWrap.children[slot].classList.remove('correct-flash')},300);
  updateHUD();checkLvl();
  // Immediately activate next pending note — don't wait for hit zone
  activateNext()}

function doWrong(n,slot){S.wrongSlots.add(slot);S.retries--;sfx.wrong();
  btnsWrap.children[slot].classList.add('wrong');
  if(S.retries<=0)doMiss(n,true);
  else{showFB(n,'ちがうよ! あと'+S.retries+'かい','#ffa44f','small');setMascot('sad')}}

function doMiss(n,fromWrong){if(n.done)return;n.done=true;n.removeAt=performance.now()+900;
  S.miss++;S.combo=0;trackDDA(false);sfx.miss();setMascot('sad');exitFever();
  n.el.classList.add('miss-anim');if(S.active===n)S.active=null;
  showFB(n,n.prob.txt+' = '+n.prob.ans,'rgba(255,255,255,.55)','small');
  updateHUD();
  // Nintendo: failure should be FUNNY. Dad photos 55%
  if(fromWrong&&Math.random()<.55){var df=DAD_FUNNY[~~(Math.random()*DAD_FUNNY.length)];setTimeout(function(){showPhoto(df.src,df.msg)},300)}
  activateNext()}

/* Inline video: auto-plays muted, does NOT pause game */
function showInlineVideo(src,msg){

  v.src=src;v.currentTime=0;v.muted=true;
  $('iv-msg').textContent=msg;

  setTimeout(function(){v.play().catch(function(){})},50);

var _videoShowing=false;
function showVideo(src,msg){
  // Guard: prevent double video (fixes combo 10 freeze)
  if(_videoShowing)return;
  _videoShowing=true;
  var p=$('video-popup'),v=$('video-popup-vid'),circle=$('vp-circle');
  v.src=src;v.currentTime=0;v.muted=false;
  $('video-popup-msg').textContent=msg;
  $('vp-hint').style.display='';
  p.style.display='';// Clear any inline display:none from previous close
  p.className='active';p.classList.remove('playing');
  S.paused=true;
  // Also pause auto-retry timer if on result screen
  if(S.autoRetryTimer){clearInterval(S.autoRetryTimer);S.autoRetryTimer=null}
  function onTapPlay(e){
    e.stopPropagation();
    circle.removeEventListener('click',onTapPlay);
    p.classList.add('playing');
    $('vp-hint').style.display='none';
    v.play().catch(function(){});
    v.onended=closeVideo;
  }
  circle.addEventListener('click',onTapPlay);
  $('vp-skip').onclick=closeVideo;
  function closeVideo(){
    v.pause();v.onended=null;circle.removeEventListener('click',onTapPlay);
    p.className='';_videoShowing=false;S.paused=false;
  }
}
function showFB(n,t,c,cls){var e=document.createElement('div');e.className='feedback'+(cls?' '+cls:'');e.textContent=t;e.style.color=c;
  e.style.left=(n.lane*25+12.5)+'%';e.style.top=(HIT_Y*S.fieldH-50)+'px';field.appendChild(e);setTimeout(function(){e.remove()},1600)}
function enterFever(){S.fever=true;root.classList.add('fever');$('fever-overlay').classList.add('active');$('fever-border').classList.add('active');
  sfx.fever();
  // Photo only — video pauses game which breaks FEVER flow
  showPhoto('photo-tempura.jpg',NAME+' FEVER!!','fever-photo');
  if(navigator.vibrate)navigator.vibrate([50,30,50])}
function exitFever(){S.fever=false;root.classList.remove('fever');$('fever-overlay').classList.remove('active');$('fever-border').classList.remove('active')}
function disableBtns(){for(var i=0;i<4;i++)btnsWrap.children[i].classList.add('disabled')}
function updateHUD(){var se=$('hud-score');se.textContent=S.score.toLocaleString();se.classList.remove('score-bump');void se.offsetWidth;se.classList.add('score-bump');
  $('hud-level').textContent=S.level+1;var cd=$('combo-display');
  if(S.combo>1){cd.classList.add('visible');$('combo-num').textContent=S.combo;cd.classList.toggle('on-fire',S.combo>=10)}
  else cd.classList.remove('visible','on-fire');
  $('level-bar').style.width=Math.min(S.notesInLvl/LVL_NOTES*100,100)+'%'}
function setMascot(mood){var am=getActiveMascot().emoji;var d=MASCOTS_MOOD[mood]||am;
  mascotEl.textContent=mood==='idle'?am:d;mascotEl.className='mascot';
  if(mood==='happy'||mood==='perfect')mascotEl.classList.add('happy');
  else if(mood==='sad')mascotEl.classList.add('sad');
  else if(mood==='fire')mascotEl.classList.add('fire');
  else if(mood==='dance'||mood==='levelup')mascotEl.classList.add('dance');
  clearTimeout(setMascot._t);setMascot._t=setTimeout(function(){mascotEl.textContent=am;mascotEl.className='mascot'},1200)}

function checkLvl(){
  // Bonus round: decrement
  if(S.bonusRound){S.bonusLeft--;$('bonus-text').textContent='⚡ BONUS x'+S.bonusLeft;if(S.bonusLeft<=0)endBonusRound()}

  S.notesInLvl++;if(S.mode==='adventure'&&S.notesInLvl>=LVL_NOTES){S.notesInLvl=0;S.level++;
  if(S.level>=DIFF.length){endGame();return}sfx.lvlUp();setMascot('dance');
  var d=DIFF[S.level];$('levelup-text').textContent='Lv.'+(S.level+1)+' '+d.lbl;
  $('levelup-overlay').style.display='flex';reA($('levelup-text'));
  setTimeout(function(){$('levelup-overlay').style.display='none'},1500);emitBig(cvs.width/2,cvs.height/2,35);
  // World theme change every 2 levels
  applyWorld(S.level);
  // Bonus round every 3 levels
  if(S.level>0&&S.level%3===0){setTimeout(startBonusRound,1600)}
  // Family photo on even levels
  if(S.level%2===0){var lvPhotos=['photo-ski.jpg','photo-beach.jpg','photo-stadium.jpg','photo-birthday.jpg'];
    setTimeout(function(){showPhoto(lvPhotos[~~(Math.random()*lvPhotos.length)],NAME+' レベルアップ!')},800)}}}

function togglePause(){if(S.screen!=='game')return;S.paused=!S.paused;$('pause-overlay').style.display=S.paused?'flex':'none'}

/* ===== END ===== */
function endGame(){S.running=false;exitFever();
  var prev=Number(localStorage.getItem('mb_highscore'))||0;var isNew=S.score>prev;
  if(isNew)localStorage.setItem('mb_highscore',S.score);
  var cc=S.perfect+S.great+S.good;var prevTot=getTotalCorrect();var newTot=addTotalCorrect(cc);
  var streak=updateStreak();
  var newUnlock=checkNewUnlock(prevTot,newTot);
  if(newUnlock)localStorage.setItem('mb_mascot',MASCOT_COLLECTION.indexOf(newUnlock));
  var tot=cc+S.miss;var acc=tot>0?cc/tot:0;
  var stars=1;if(acc>=.7)stars=2;if(acc>=.88&&S.maxCombo>=5)stars=3;

  // Result photo: pick based on performance
  var resultPhotos=[
    {s:'photo-dad-sleep.jpg',border:'rgba(255,255,255,.4)'},  // 1 star: sleeping dad
    {s:'photo-stadium.jpg',border:'#4fc3f7'},                  // 2 stars: sporty celebration
    {s:'photo-birthday.jpg',border:'#ffeb3b'}                  // 3 stars: birthday party!
  ];
  var rp=resultPhotos[stars-1];
  $('result-photo-area').innerHTML='<img class="result-photo" src="'+rp.s+'" alt="" style="border-color:'+rp.border+'">';

  var titles=[NAME+' がんばったね! 🌈',NAME+' すごい! 🎉',NAME+' さいこう! 👑'];
  $('result-title').textContent=titles[stars-1];
  var starEls=$('result-stars').children;
  for(var i=0;i<3;i++){starEls[i].className='result-star';if(i<stars)(function(i){setTimeout(function(){starEls[i].classList.add('earned')},300+i*400)})(i)}
  $('result-new-record').innerHTML=isNew?'<div class="new-record">🎊 '+NAME+' NEW RECORD! 🎊</div>':'';
  // NEW RECORD → play dad congratulations video
  if(isNew){var dv=DAD_VIDEOS[~~(Math.random()*DAD_VIDEOS.length)];setTimeout(function(){showVideo(dv.src,'パパも よろこんでる!')},1500)}
  if(newUnlock){$('result-unlock').innerHTML='<div class="result-unlock">'+newUnlock.emoji+' '+NAME+'が「'+newUnlock.name+'」をゲット!</div>';sfx.unlock()}
  else{var next=MASCOT_COLLECTION.find(function(m){return newTot<m.need});
    $('result-unlock').innerHTML=next?'<div style="color:rgba(255,255,255,.35);font-size:.75rem;margin:4px 0">つぎのキャラまで あと'+(next.need-newTot)+'もんだい</div>':''}
  $('result-stats').innerHTML=[row('スコア',S.score.toLocaleString()),row('コンボ',S.maxCombo,''),
    row('PERFECT',S.perfect,'color:#ffeb3b'),row('GREAT',S.great,'color:#4fc3f7'),
    row('GOOD',S.good,'color:#66bb6a'),row('MISS',S.miss,'color:rgba(255,255,255,.35)'),
    row('レベル',S.level+1,''),row('れんぞく',streak+'にち','color:#ffa44f')].join('');
  var msgs=[NAME+' つぎはもっとできるよ!\nパパをおこしてあげよう!',
    'いいかんじ '+NAME+'!\n'+S.perfect+'かい PERFECTだよ!',
    'かんぺき! '+NAME+'は\nさんすうマスターだ!'];
  // Progress nudges (Splatoon "one more game" hooks)
  var nextTh=getNextPhotoThreshold();
  var nudge=nextTh?'\nつぎの写真まで あと'+(nextTh-newTot)+'もんだい!':'';
  $('result-msg').textContent=msgs[stars-1]+nudge;showScreen('result');

  // Iwata philosophy: ALWAYS celebrate at end, regardless of performance
  for(var ci=0;ci<(stars>=2?8:4);ci++)(function(ci){setTimeout(function(){emitBig(Math.random()*cvs.width,Math.random()*cvs.height*.6,stars>=2?25:12)},ci*250)})(ci);

  // Splatoon auto-retry countdown (7 seconds — longer to allow video viewing)
  var retryCount=7;
  clearInterval(S.autoRetryTimer);
  $('auto-retry').textContent=retryCount+'びょうで もういっかい...';
  S.autoRetryTimer=setInterval(function(){
    // Don't count down while video is showing
    if(_videoShowing)return;
    retryCount--;
    if(retryCount<=0){clearInterval(S.autoRetryTimer);S.autoRetryTimer=null;$('auto-retry').textContent='';retryGame()}
    else{$('auto-retry').textContent=retryCount+'びょうで もういっかい...'}
  },1000);
  (function cl(){if(S.screen!=='result')return;for(var j=0;j<particles.length;j++)particles[j].update();
    particles=particles.filter(function(p){return p.life>0});cx.clearRect(0,0,cvs.width,cvs.height);cx.globalAlpha=1;
    for(var k=0;k<particles.length;k++)particles[k].draw(cx);cx.globalAlpha=1;requestAnimationFrame(cl)})()}
function row(l,v,s){return'<div class="stat-row"><span class="stat-label">'+l+'</span><span class="stat-value"'+(s?' style="'+s+'"':'')+'>'+v+'</span></div>'}
function retryGame(){clearInterval(S.autoRetryTimer);S.mode==='practice'?startPractice(S.practiceLevel):startAdventure()}
function goHome(){clearInterval(S.autoRetryTimer);S.running=false;S.paused=false;$('pause-overlay').style.display='none';clearField();showTitle()}
function resizeCanvas(){var r=root.getBoundingClientRect();cvs.width=r.width;cvs.height=r.height;var fr=field.getBoundingClientRect();S.fieldH=fr.height}

document.addEventListener('keydown',function(e){if(S.screen!=='game'||!S.running)return;
  var m={'d':0,'f':1,'j':2,'k':3,'1':0,'2':1,'3':2,'4':3};
  if(m[e.key]!==undefined){e.preventDefault();tapAnswer(m[e.key])}if(e.key==='Escape')togglePause()});
document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});
window.addEventListener('resize',function(){resizeCanvas();if(S.screen==='game')posHitZone()});

makeStars();resizeCanvas();showTitle();
document.addEventListener('touchstart',ensureAudio,{once:true});
document.addEventListener('click',ensureAudio,{once:true});
</script>
